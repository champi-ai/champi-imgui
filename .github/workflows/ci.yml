name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - name: Check out
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Clean up virtualenv
      run: rm -rf .venv

    - name: Install uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Run ruff check
      run: uv run ruff check .

    - name: Run ruff format check
      run: uv run ruff format --check .

    - name: Run mypy
      run: uv run mypy src

    - name: Run tests with coverage
      run: uv run pytest

    - name: Generate coverage badge
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p badges
        uv run genbadge coverage -i coverage.xml -o badges/coverage.svg

    - name: Commit coverage badge
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      run: |
        git config --local user.name "Divagnz"
        git config --local user.email "oscar.liguori.bagnis@gmail.com"
        git add badges/coverage.svg
        git diff --staged --quiet || git commit -m "chore: update coverage badge"
        git push https://Divagnz:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

  security:
    name: Security Scan
    runs-on: self-hosted

    steps:
    - name: Check out
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Clean up virtualenv
      run: rm -rf .venv

    - name: Install uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

    - name: Install detect-secrets
      run: uv tool install detect-secrets

    - name: Run detect-secrets scan
      run: |
        detect-secrets scan --baseline .secrets.baseline
        if [ $? -ne 0 ]; then
          echo "⚠️ Potential secrets detected! Please review the findings."
          exit 1
        fi
